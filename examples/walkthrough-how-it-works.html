<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walkthrough Skill - How It Works</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        wt: {
          bg: '#000000', surface: '#0a0a0a', raised: '#141414',
          border: '#2a2a2a', fg: '#ffffff', muted: '#a0a0a0',
          accent: '#a855f7', file: '#c084fc', red: '#ef4444',
        },
        node: {
          component: '#a855f7', utility: '#3b82f6',
          external: '#525252', event: '#06b6d4', data: '#10b981',
        },
      }}},
    };
  </script>
  <style>
    .mermaid-wrap svg { max-width: none !important; height: auto !important; }
    .mermaid-wrap .node { cursor: pointer; }
    .mermaid-wrap .node:hover rect,
    .mermaid-wrap .node:hover polygon,
    .mermaid-wrap .node:hover circle,
    .mermaid-wrap .node:hover .label-container { filter: brightness(1.3); transition: filter .15s; }
    .dt-body p { color:#a0a0a0; font-size:.88rem; line-height:1.65; margin-bottom:10px; }
    .dt-body p code {
      background:rgba(168,85,247,.12); padding:1px 6px; border-radius:4px;
      font-family:'SF Mono','Fira Code',monospace; font-size:.82rem; color:#c084fc;
    }
    .dt-body .shiki, .dt-body pre.code-fallback {
      background: #000000; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 14px 16px; overflow-x: auto; margin: 8px 0 14px;
    }
    .dt-body .shiki { background: #000000 !important; }
    .dt-body .shiki code, .dt-body pre.code-fallback code {
      font-family: 'SF Mono','Fira Code',monospace; font-size: .78rem; line-height: 1.55;
      background: none; padding: 0; border-radius: 0;
    }
    .dt-body .shiki code { color: inherit; }
    .dt-body pre.code-fallback code { color: #e0e0e0; }
    .detail-panel { z-index: 200; }
    .controls { z-index: 150; }
    .header { z-index: 120; }
    .legend { z-index: 110; }
  </style>
</head>
<body class="bg-wt-bg text-wt-fg min-h-screen overflow-hidden">
  <div id="root"></div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const SUMMARY = "The Walkthrough skill generates interactive HTML diagrams that explain codebase features in under 2 minutes. It uses parallel subagents to explore your code, synthesizes findings into 5-12 key concepts, and produces a self-contained HTML file with clickable Mermaid diagrams.";

    const DIAGRAM = `graph TD
    subgraph trigger["User Trigger"]
        userRequest[["User Request"]]:::event
        style userRequest width:180px,height:60px
    end

    subgraph config["Configuration"]
        skillDefinition[["Skill Definition"]]:::data
        style skillDefinition width:180px,height:60px
        htmlPatterns[["HTML Patterns"]]:::data
        style htmlPatterns width:180px,height:60px
    end

    subgraph processing["Processing Pipeline"]
        scopeAnalysis[["Scope Analysis"]]:::component
        style scopeAnalysis width:180px,height:60px
        parallelExploration[["Parallel Exploration"]]:::component
        style parallelExploration width:200px,height:60px
        nodeSynthesis[["Node Synthesis"]]:::component
        style nodeSynthesis width:180px,height:60px
        diagramSelection[["Diagram Selection"]]:::utility
        style diagramSelection width:180px,height:60px
    end

    subgraph output["Output Generation"]
        htmlGeneration[["HTML Generation"]]:::component
        style htmlGeneration width:180px,height:60px
        mermaidRender[["Mermaid Rendering"]]:::external
        style mermaidRender width:180px,height:60px
        detailPanel[["Detail Panel"]]:::component
        style detailPanel width:180px,height:60px
    end

    userRequest -->|"triggers"| skillDefinition
    skillDefinition -->|"defines workflow"| scopeAnalysis
    skillDefinition -.->|"references"| htmlPatterns
    scopeAnalysis -->|"dispatches"| parallelExploration
    parallelExploration -->|"reports findings"| nodeSynthesis
    nodeSynthesis -->|"produces nodes"| diagramSelection
    diagramSelection -->|"template + data"| htmlGeneration
    htmlPatterns -.->|"provides patterns"| htmlGeneration
    htmlGeneration ==>|"outputs"| mermaidRender
    mermaidRender -->|"click events"| detailPanel

    classDef component fill:#a855f7,stroke:#c084fc,color:#fff
    classDef utility fill:#3b82f6,stroke:#60a5fa,color:#fff
    classDef external fill:#525252,stroke:#737373,color:#fff
    classDef event fill:#06b6d4,stroke:#22d3ee,color:#000
    classDef data fill:#10b981,stroke:#34d399,color:#fff`;

    const NODES = {
      userRequest: {
        title: "User Request",
        description: "The entry point where a user asks to walkthrough, explain a flow, or visualize how something works. Triggers can be explicit like 'walkthrough how X works' or implicit like 'explain this flow'.",
        files: ["skills/walkthrough/skill.md:17-29"],
      },
      skillDefinition: {
        title: "Skill Definition",
        description: "The skill.md file defines the complete workflow: understanding scope, exploring codebase with parallel subagents, choosing diagram type, and generating HTML. It specifies allowed tools and quality checklist.",
        files: ["skills/walkthrough/skill.md"],
      },
      htmlPatterns: {
        title: "HTML Patterns",
        description: "Reference documentation for generated HTML files: color palette, Mermaid config, Shiki syntax highlighting setup, React component architecture, and all CSS/JS patterns needed for interactive walkthroughs.",
        files: ["skills/walkthrough/references/html-patterns.md"],
      },
      scopeAnalysis: {
        title: "Scope Analysis",
        description: "Determines what type of walkthrough to generate: feature flow, data flow, architectural overview, request lifecycle, or database schema. Frames the output as a mental model with 5-12 key concepts.",
        files: ["skills/walkthrough/skill.md:20-33"],
      },
      parallelExploration: {
        title: "Parallel Exploration",
        description: "Launches 2-4 Explore subagents to investigate different codebase areas in parallel. Each agent reports purpose, connections, node suggestions, and optional key snippets. Keeps main context clean.",
        files: ["skills/walkthrough/skill.md:35-99"],
        code: `// Split exploration into independent tasks
Task({ subagent_type: "Explore", prompt: "Investigate X area..." })
Task({ subagent_type: "Explore", prompt: "Investigate Y area..." })`,
        lang: "javascript",
      },
      nodeSynthesis: {
        title: "Node Synthesis",
        description: "Combines subagent findings into a node list (ID, label, files, description), edge list with verb labels, and 2-4 subgraph groupings. Each node represents a concept, not a function.",
        files: ["skills/walkthrough/skill.md:90-99"],
      },
      diagramSelection: {
        title: "Diagram Selection",
        description: "Chooses between flowchart (graph TD/LR) for feature flows and architectures, or ER diagram (erDiagram) for database schemas. Mixed topics can render both diagrams stacked.",
        files: ["skills/walkthrough/skill.md:101-182"],
      },
      htmlGeneration: {
        title: "HTML Generation",
        description: "Creates a self-contained HTML file with native ES modules, Mermaid ESM import, Tailwind CDN, and Shiki syntax highlighting. Uses pure black background with purple accents.",
        files: ["skills/walkthrough/skill.md:184-280"],
        code: `import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({ securityLevel: 'loose', ... });`,
        lang: "javascript",
      },
      mermaidRender: {
        title: "Mermaid Rendering",
        description: "Browser renders the Mermaid diagram with clickable nodes. Supports pan (drag), zoom (scroll wheel), and fit-to-screen. Node clicks trigger detail panel display.",
        files: ["skills/walkthrough/references/html-patterns.md:126-166"],
      },
      detailPanel: {
        title: "Detail Panel",
        description: "Slides in from right when clicking nodes. Shows title, description (1-2 sentences), optional code snippet with Shiki highlighting, and file paths. Closes with × or Escape key.",
        files: ["skills/walkthrough/references/html-patterns.md:385-425"],
      },
    };

    const LEGEND = [
      { label: 'Component', color: 'bg-node-component' },
      { label: 'Utility', color: 'bg-node-utility' },
      { label: 'External', color: 'bg-node-external' },
      { label: 'Event', color: 'bg-node-event' },
      { label: 'Data', color: 'bg-node-data' },
    ];

    const NODE_NAME_MAP = {
      'User Request': 'userRequest',
      'Skill Definition': 'skillDefinition',
      'HTML Patterns': 'htmlPatterns',
      'Scope Analysis': 'scopeAnalysis',
      'Parallel Exploration': 'parallelExploration',
      'Node Synthesis': 'nodeSynthesis',
      'Diagram Selection': 'diagramSelection',
      'HTML Generation': 'htmlGeneration',
      'Mermaid Rendering': 'mermaidRender',
      'Detail Panel': 'detailPanel',
    };

    function mapNodeTextToId(nodeText) {
      const trimmed = nodeText?.trim();
      if (!trimmed) return null;
      if (NODE_NAME_MAP[trimmed]) return NODE_NAME_MAP[trimmed];
      const lowerText = trimmed.toLowerCase();
      for (const [name, id] of Object.entries(NODE_NAME_MAP)) {
        if (name.toLowerCase() === lowerText) return id;
      }
      return null;
    }

    // State
    let activeId = null;
    let summaryCollapsed = true;
    let zoom = 1, panX = 0, panY = 0;
    let dragOn = false, dragLx = 0, dragLy = 0;
    let zoomDisplayEl = null;

    const viewport = document.getElementById('root');
    viewport.innerHTML = `
      <header class="header fixed top-0 inset-x-0 px-6 py-3.5 bg-gradient-to-b from-wt-bg to-transparent pointer-events-none">
        <h1 class="text-base font-semibold text-wt-fg">Walkthrough Skill</h1>
        <p class="text-sm text-wt-muted mt-0.5">How the interactive diagram generator works</p>
      </header>
      <div id="summary-pill" class="fixed top-16 left-6 z-10 px-3 py-1.5 bg-wt-surface/60 backdrop-blur border border-wt-border rounded-full shadow-lg cursor-pointer hover:bg-wt-surface/80 transition-all duration-300">
        <span class="text-xs text-wt-muted font-medium">ℹ︎ Summary</span>
      </div>
      <div id="summary-card" class="fixed top-16 left-6 z-10 max-w-lg px-4 py-3 bg-wt-surface/80 backdrop-blur border border-wt-border rounded-lg shadow-lg cursor-pointer transition-all duration-300 hidden">
        <p class="text-sm text-wt-muted leading-relaxed">${SUMMARY}</p>
        <p class="text-[0.65rem] text-wt-muted/50 mt-1.5">Click to dismiss</p>
      </div>
      <div id="viewport" class="w-full h-screen overflow-hidden cursor-grab active:cursor-grabbing">
        <div id="canvas" class="origin-top-left will-change-transform inline-block p-[80px_60px_60px]">
          <div id="diagram" class="mermaid-wrap"></div>
        </div>
      </div>
      <div class="controls fixed bottom-5 left-5 flex flex-col gap-2">
        <button id="zoom-in" class="w-9 h-9 rounded-lg border border-wt-border bg-wt-surface text-wt-fg flex items-center justify-center hover:bg-wt-raised transition-colors text-lg">+</button>
        <div id="zoom-display" class="text-xs text-wt-muted text-center py-1">100%</div>
        <button id="zoom-out" class="w-9 h-9 rounded-lg border border-wt-border bg-wt-surface text-wt-fg flex items-center justify-center hover:bg-wt-raised transition-colors text-lg">−</button>
        <button id="zoom-fit" class="mt-1 px-2 py-1.5 text-xs rounded-lg border border-wt-border bg-wt-surface text-wt-muted hover:bg-wt-raised transition-colors">Fit</button>
      </div>
      <div class="legend fixed bottom-5 left-1/2 -translate-x-1/2 flex gap-4 px-4 py-2 bg-wt-surface border border-wt-border rounded-lg shadow-xl">
        ${LEGEND.map(l => `<span class="flex items-center gap-1.5 text-xs text-wt-muted"><span class="w-2 h-2 rounded-full ${l.color}"></span>${l.label}</span>`).join('')}
      </div>
      <div id="detail-panel" class="detail-panel fixed top-4 right-4 bottom-4 w-[560px] bg-wt-surface border border-wt-border rounded-xl shadow-2xl flex flex-col overflow-hidden hidden">
        <button id="close-detail" class="absolute top-3 right-3 z-10 w-7 h-7 rounded-md border border-wt-border bg-wt-raised text-wt-muted flex items-center justify-center text-lg hover:bg-wt-red hover:border-wt-red hover:text-white transition-colors">&times;</button>
        <div class="flex-1 overflow-y-auto p-5">
          <h2 id="detail-title" class="text-lg font-bold text-wt-fg mb-3 pr-9"></h2>
          <div class="dt-body"><p id="detail-desc"></p></div>
          <div id="detail-code" class="dt-body hidden">
            <pre class="code-fallback"><code id="detail-code-content"></code></pre>
          </div>
          <div id="detail-files" class="mt-4 pt-3 border-t border-wt-border hidden">
            <div class="text-[0.7rem] uppercase tracking-wider text-wt-muted font-semibold mb-1.5">Files</div>
            <code id="detail-files-list" class="text-sm text-wt-file font-mono leading-relaxed"></code>
          </div>
        </div>
      </div>
      <div class="fixed bottom-5 right-5 text-xs text-wt-muted opacity-50">
        <kbd>Scroll</kbd> zoom · <kbd>Drag</kbd> pan · Click nodes
      </div>
    `;

    const canvas = document.getElementById('canvas');
    const viewportEl = document.getElementById('viewport');
    const summaryPill = document.getElementById('summary-pill');
    const summaryCard = document.getElementById('summary-card');
    const detailPanel = document.getElementById('detail-panel');
    const detailTitle = document.getElementById('detail-title');
    const detailDesc = document.getElementById('detail-desc');
    const detailCode = document.getElementById('detail-code');
    const detailCodeContent = document.getElementById('detail-code-content');
    const detailFiles = document.getElementById('detail-files');
    const detailFilesList = document.getElementById('detail-files-list');
    zoomDisplayEl = document.getElementById('zoom-display');

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
      zoomDisplayEl.textContent = Math.round(zoom * 100) + '%';
    }

    function fitToScreen() {
      const svg = canvas.querySelector('svg');
      if (!svg) return;
      const vw = viewportEl.clientWidth, vh = viewportEl.clientHeight;
      const sw = svg.getBoundingClientRect().width / zoom;
      const sh = svg.getBoundingClientRect().height / zoom;
      const fit = Math.max(0.15, Math.min(2, Math.min((vw - 80) / sw, (vh - 80) / sh)));
      zoom = fit;
      panX = (vw - sw * fit) / 2;
      panY = (vh - sh * fit) / 2;
      applyTransform();
    }

    function showDetail(nodeId) {
      const node = NODES[nodeId];
      if (!node) return;
      activeId = nodeId;
      document.querySelectorAll('.mermaid-wrap .node').forEach(n => n.style.opacity = '0.4');
      const activeNode = document.querySelector(`.mermaid-wrap .node[id*="${nodeId}"]`);
      if (activeNode) activeNode.style.opacity = '1';
      detailTitle.textContent = node.title;
      detailDesc.textContent = node.description;
      if (node.code) {
        detailCodeContent.textContent = node.code;
        detailCode.classList.remove('hidden');
      } else {
        detailCode.classList.add('hidden');
      }
      if (node.files?.length) {
        detailFilesList.innerHTML = node.files.map(f => `<span>${f}<br/></span>`).join('');
        detailFiles.classList.remove('hidden');
      } else {
        detailFiles.classList.add('hidden');
      }
      detailPanel.classList.remove('hidden');
    }

    function hideDetail() {
      activeId = null;
      document.querySelectorAll('.mermaid-wrap .node').forEach(n => n.style.opacity = '1');
      detailPanel.classList.add('hidden');
    }

    // Summary toggle
    summaryPill.addEventListener('click', () => {
      summaryCollapsed = false;
      summaryPill.classList.add('hidden');
      summaryCard.classList.remove('hidden');
    });
    summaryCard.addEventListener('click', () => {
      summaryCollapsed = true;
      summaryCard.classList.add('hidden');
      summaryPill.classList.remove('hidden');
    });

    // Zoom controls
    document.getElementById('zoom-in').addEventListener('click', () => {
      zoom = Math.min(4, zoom * 1.25);
      applyTransform();
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      zoom = Math.max(0.15, zoom / 1.25);
      applyTransform();
    });
    document.getElementById('zoom-fit').addEventListener('click', fitToScreen);

    // Close detail
    document.getElementById('close-detail').addEventListener('click', hideDetail);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideDetail();
    });

    // Pan/zoom
    viewportEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      const r = viewportEl.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      const nz = Math.min(4, Math.max(0.15, zoom * f)), sc = nz / zoom;
      panX = mx - sc * (mx - panX);
      panY = my - sc * (my - panY);
      zoom = nz;
      applyTransform();
    }, { passive: false });

    viewportEl.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.node')) return;
      dragOn = true;
      dragLx = e.clientX;
      dragLy = e.clientY;
      viewportEl.setPointerCapture(e.pointerId);
    });
    viewportEl.addEventListener('pointermove', (e) => {
      if (!dragOn) return;
      panX += e.clientX - dragLx;
      panY += e.clientY - dragLy;
      dragLx = e.clientX;
      dragLy = e.clientY;
      applyTransform();
    });
    viewportEl.addEventListener('pointerup', () => dragOn = false);
    viewportEl.addEventListener('pointercancel', () => dragOn = false);

    // Initialize Mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      themeVariables: {
        primaryColor: '#0a0a0a',
        primaryTextColor: '#ffffff',
        primaryBorderColor: '#2a2a2a',
        lineColor: '#a0a0a0',
        background: '#000000',
        secondaryColor: '#000000',
        tertiaryColor: '#000000',
        mainBkg: '#0a0a0a',
        nodeBorder: '#2a2a2a',
        clusterBkg: 'rgba(10,10,10,0.8)',
        clusterBorder: '#7c3aed',
        titleColor: '#ffffff',
        edgeLabelBackground: 'transparent',
      },
      flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' },
    });

    const diagramEl = document.getElementById('diagram');
    mermaid.render('walkthrough-diagram', DIAGRAM).then(({ svg }) => {
      diagramEl.innerHTML = svg;

      // Attach click handlers to nodes
      diagramEl.querySelectorAll('.node').forEach(node => {
        const nodeText = node.querySelector('.nodeLabel')?.textContent;
        const nodeId = mapNodeTextToId(nodeText);
        if (nodeId && NODES[nodeId]) {
          node.style.cursor = 'pointer';
          node.addEventListener('click', (e) => {
            e.stopPropagation();
            showDetail(nodeId);
          });
        }
      });

      // Fit to screen after render
      setTimeout(fitToScreen, 300);
    });

    window.addEventListener('resize', fitToScreen);
  </script>
</body>
</html>
